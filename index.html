<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomialsz</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #7f1dc0, #401579, #234ba1);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sidebar {
            background: #1e1e1e;
            padding: 20px;
            width: 360px;
            height: 100%;
            overflow: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .sidebar h3 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #7f2aee;
        }

        .main-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100%;
        }

        .container {
            position: relative;
            width: 800px;
            max-width: 90%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 40vh;
            max-height: 90vh;
            overflow: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #7f2aee;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #903bff;
        }

        pre {
            margin-top: 20px;
            background: #111;
            padding: 15px;
            border-radius: 10px;
            min-height: 70px;
            max-height: 70px;
            overflow: auto;
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
        }

        .roots-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-family: 'Fira Code', monospace;
        }

        .roots-list li {
            background: #2a2a2a;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #7f2aee;
        }

        .roots-list li::before {
            content: "🪾";
            margin-right: 5px;
            display: inline-block;
            transform: scaleY(-1);
        }

        .empty-roots {
            color: #888;
            text-align: center;
            font-style: italic;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 35vh;
                height: auto;
                box-shadow: none;
                border-bottom: 2px solid #2a2a2a;
            }

            .main-area {
                width: 100%;
                height: auto;
                flex: 1;
                overflow: hidden;
                padding: 15px;
                box-sizing: border-box;
            }

            .container {
                position: relative;
                width: 100%;
                max-width: 100%;
                padding: 20px;
                border-radius: 15px;
                max-height: 100%;
            }

            input {
                font-size: 16px;
            }

            button {
                font-size: 16px;
                padding: 14px;
            }

            pre {
                font-size: 13px;
                min-height: 15px;
                max-height: 30px;
            }

            .roots-list li {
                font-size: 13px;
                padding: 8px;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>Roots</h3>
    <div id="roots-container">
        <div class="empty-roots">[...]</div>
    </div>
</div>

<div class="main-area">
    <div class="container">
        <h2><a href="https://github.com/Zaqu1h/polynomialsz" target="_blank" style="color: white; text-decoration: none;">Polynomialsz v1.1.2</a></h2>

        <input id="input" placeholder="Example: x^3 - x^2 - x - 1, x**10 - 1...">
        <button id="btn" onclick="fatorar()" disabled>Factorize / Find roots</button>

        <div style="position: absolute; bottom: 1.3vh; left: 30px; display: flex; align-items: center; gap: 8px; font-size: 2.5vh; color: white; font-family: 'Segoe UI', sans-serif;">
            <a href="https://www.uesc.br/" target="_blank">
                <img src="UESCBW.png" style="width: 3vh; height: auto; opacity: 0.8;">
            </a>
            <span style="margin-left: 5px;">
                <a href="https://github.com/Zaqu1h/" target="_blank" style="color: #7f2aee; text-decoration: underline;">Isaque Passos</a>
                | Computer Science, 2026
            </span>
        </div>

        <pre id="saida">Loading...</pre>
    </div>
</div>

</body>
</html>

<script>
// Enter ativa
document.getElementById('input').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        if (!document.getElementById('btn').disabled) {
            fatorar();
        }
    }
});

function parsePolinomio(str) {
    str = str.replace(/\s+/g, '');

    str = str.replaceAll('⁹', '^9')
             .replaceAll('⁸', '^8')
             .replaceAll('⁷', '^7')
             .replaceAll('⁶', '^6')
             .replaceAll('⁵', '^5')
             .replaceAll('⁴', '^4')
             .replaceAll('³', '^3')
             .replaceAll('²', '^2')
             .replaceAll('¹', '^1')
             .replaceAll('⁰', '^0')
             .replaceAll('**', '^');

    let varMatch = str.match(/[a-zA-Z]/);
    if (!varMatch) throw new Error("No variables found.");
    let variavel = varMatch[0];

    let allVars = [...str.matchAll(/[a-zA-Z]/g)];
    if (allVars.some(m => m[0] !== variavel)) throw new Error("Use only one variable!");

    let termos = str.match(/[+-]?[^+-]+/g);
    if (!termos) throw new Error("Invalid expression.");

    let mapa = {};

    termos.forEach(t => {
        let sinal = t.startsWith('-') ? -1 : 1;
        t = t.replace(/^[+-]/, '');
        let coef = 1, exp = 0;

        if (t.includes(variavel)) {
            let partes = t.split(variavel);
            coef = partes[0] === '' ? 1 :
                   partes[0] === '-' ? -1 :
                   parseInt(partes[0]) || 1;

            exp = (partes[1] && partes[1].startsWith('^'))
                ? parseInt(partes[1].slice(1))
                : 1;
        } else {
            coef = parseInt(t);
            exp = 0;
        }

        coef *= sinal;
        mapa[exp] = (mapa[exp] || 0) + coef;
    });

    let grau = Math.max(...Object.keys(mapa).map(Number));
    let coefArray = [];

    for (let i = grau; i >= 0; i--) coefArray.push(mapa[i] || 0);

    return coefArray;
}

let fatorarPtrFunc;

window.Module = {
    onRuntimeInitialized: function() {
        fatorarPtrFunc = (ptr, len) => {
            return Module.ccall('fatorar_array', 'number', ['number', 'number'], [ptr, len]);
        };
        document.getElementById("btn").disabled = false;
        document.getElementById("saida").innerText = "[...]";
    }
};

function extrairRaizes(fatoracao) {
    let raizes = [];
    let expr = fatoracao.replace(/\s+/g, '');

    let i = 0;

    while (i < expr.length) {

        // procura "(x+..." ou "(x-..."
        if (expr[i] === '(' && expr[i+1] === 'x' && (expr[i+2] === '+' || expr[i+2] === '-')) {

            let sinal = expr[i+2];
            let j = i + 3;

            // lê a expressão até fechar o parêntese correto
            let nivel = 1;
            let valor = '';

            while (j < expr.length && nivel > 0) {
                if (expr[j] === '(') nivel++;
                else if (expr[j] === ')') nivel--;

                if (nivel > 0) valor += expr[j];
                j++;
            }

            valor = valor.trim();

            let raiz;

            if (sinal === '-') {
                raiz = valor;
            } else {
                if (/^-?\d+(\.\d+)?$/.test(valor)) {
                    raiz = (-parseFloat(valor)).toString();
                } else {
                    raiz = '-' + valor;
                }
            }

            raizes.push(raiz);

            i = j;
            continue;
        }

        i++;
    }

    // detecta fatores x^2 - (algo) com parênteses balanceados
    let regexQuad = /\(x\^2-/g;
    let matchQuad;

    while ((matchQuad = regexQuad.exec(expr)) !== null) {
        let inicio = matchQuad.index + 5; // depois de "(x^2-"
        let nivel = 1;
        let j = inicio;
        let valor = '';
        
        while (j < expr.length && nivel > 0) {
            if (expr[j] === '(') nivel++;
            else if (expr[j] === ')') nivel--;
            if (nivel > 0) valor += expr[j];
            j++;
        }
        
        valor = valor.trim();
        
        if (valor.startsWith('(') && valor.endsWith(')')) {
            valor = valor.slice(1, -1);
        }
    }

        // trata x e x^n
        // detecta apenas fator x isolado ou x^n
    let fatorX = expr.match(/(?:^|\))\(?x(?:\^(\d+))?\)?(?=\(|$)/g);

    if (fatorX) {
        for (let item of fatorX) {
            let match = item.match(/x\^(\d+)/);
            let grau = match ? parseInt(match[1]) : 1;

            for (let k = 0; k < grau; k++) {
                raizes.push('0');
            }
        }
    }

    return raizes;
}

function exibirRaizes(raizes) {
    const container = document.getElementById('roots-container');

    if (!raizes.length) {
        container.innerHTML = '<div class="empty-roots">Nenhuma raiz encontrada</div>';
        return;
    }

    let html = '<ul class="roots-list">';

    for (let r of raizes) {
        let simbolo = r.includes('i') ? '≈' : '=';
        let raizFormatada = formatarRaiz(r);
        html += `<li>x ${simbolo} ${raizFormatada}</li>`;
    }

    html += '</ul>';
    container.innerHTML = html;
}
function formatarRaiz(raiz) {
    // Exp -> e^expressão
    raiz = raiz.replace(/Exp\[([^\]]+)\]/g, (match, exp) => {
        const sobrescrito = exp
            .replace(/[0-9]/g, d => '⁰¹²³⁴⁵⁶⁷⁸⁹'[d])
            .replace(/P/g, 'ᵖ')
            .replace(/i/g, 'ⁱ')
            .replace(/\+/g, '⁺')
            .replace(/\-/g, '⁻')
            .replace(/\*/g, '')
            .replace(/\//g, '⸍')
            .replace(/\(/g, '⁽')
            .replace(/\)/g, '⁾');
        return 'e' + sobrescrito;
    });
    
    // Sqrt[...] com colchetes
    raiz = raiz.replace(/[Ss]qrt\[([^\]]+)\]/g, '√($1)');
    
    // Sqrt(...) com parênteses balanceados
    let resultado = '';
    let i = 0;
    while (i < raiz.length) {
        if (raiz.substring(i, i + 5).toLowerCase() === 'sqrt(') {
            let nivel = 1;
            let j = i + 5;
            let exp = '';
            while (j < raiz.length && nivel > 0) {
                if (raiz[j] === '(') nivel++;
                else if (raiz[j] === ')') nivel--;
                if (nivel > 0) exp += raiz[j];
                j++;
            }
            resultado += '√(' + exp + ')';
            i = j;
        } else {
            resultado += raiz[i];
            i++;
        }
    }
    
    return resultado;
}

function fatorar() {
    if (!fatorarPtrFunc) {
        alert("Waiting...");
        return;
    }

    let input = document.getElementById("input").value;

    if (!input.trim()) {
        alert("Type your polynomial");
        return;
    }

    let coef;

    try {
        coef = parsePolinomio(input);
    } catch (e) {
        document.getElementById("saida").innerText = "Error: " + e.message;
        document.getElementById("roots-container").innerHTML = '<div class="empty-roots">Error</div>';
        return;
    }

    let bytes = coef.length * 4;
    let ptr = Module._malloc(bytes);

    for (let i = 0; i < coef.length; i++) {
        Module.HEAP32[ptr / 4 + i] = coef[i];
    }

    let resultPtr = fatorarPtrFunc(ptr, coef.length);

    let bytesArray = [];

    for (let i = 0; i < 50000; i++) {
        let byte = Module.HEAPU8[resultPtr + i];
        if (byte === 0) break;
        bytesArray.push(byte);
    }

    let resultadoCompleto = new TextDecoder('utf-8')
        .decode(new Uint8Array(bytesArray));

    let resultado = resultadoCompleto;

    let idx = resultadoCompleto.indexOf('=');
    if (idx !== -1) {
        resultado = resultadoCompleto.substring(idx + 1).trim();
    }

    document.getElementById("saida").innerText = resultado;

    let raizes = extrairRaizes(resultado);
    exibirRaizes(raizes);

    Module._free(ptr);
}
</script>

<script src="polynomialsz.js"></script>
