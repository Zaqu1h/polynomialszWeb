<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Polynomialsz</title>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #7f1dc0, #401579, #234ba1);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 15px;
    width: 700px;
    max-height: 90vh;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 96%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #7f2aee;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #903bff;
}

pre {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    min-height: 80px;
    max-height: 400px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'Roboto', 'Courier New', 'Consolas', monospace;
    font-size: 16px;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

    <h2>Polynomialsz</h2>

    <input id="input" placeholder="Ex: x^3 - x^2 - x - 1, x**10 + 1, etc">
    <button id="btn" onclick="fatorar()" disabled>Factorize / Find roots</button>

    <pre id="saida">Loading...</pre>
</div>

<script>
// Ativar tecla Enter no input
document.getElementById('input').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        if (!document.getElementById('btn').disabled) {
            fatorar();
        }
    }
});

function parsePolinomio(str) {

    str = str.replace(/\s+/g, '');

    str = str.replaceAll('⁹', '^9')
             .replaceAll('⁸', '^8')
             .replaceAll('⁷', '^7')
             .replaceAll('⁶', '^6')
             .replaceAll('⁵', '^5')
             .replaceAll('⁴', '^4')
             .replaceAll('³', '^3')
             .replaceAll('²', '^2')
             .replaceAll('¹', '^1')
             .replaceAll('⁰', '^0')
             .replaceAll('**', '^');
    
    let varMatch = str.match(/[a-zA-Z]/);
    if (!varMatch) throw new Error("No variables found.");
    let variavel = varMatch[0];
    
    let allVars = [...str.matchAll(/[a-zA-Z]/g)];
    if (allVars.some(m => m[0] !== variavel)) throw new Error("Use only one variable!");
    
    let termos = str.match(/[+-]?[^+-]+/g);
    if (!termos) throw new Error("Invalid expression.");
    
    let mapa = {};
    
    termos.forEach(t => {
        let sinal = t.startsWith('-') ? -1 : 1;
        t = t.replace(/^[+-]/, '');
        let coef = 1, exp = 0;
        
        if (t.includes(variavel)) {
            let partes = t.split(variavel);
            if (partes[0] === '') coef = 1;
            else if (partes[0] === '-') coef = -1;
            else coef = parseInt(partes[0]);
            if (isNaN(coef)) coef = 1;
            
            if (partes[1] && partes[1].startsWith('^')) exp = parseInt(partes[1].slice(1));
            else exp = 1;
        } else {
            coef = parseInt(t);
            exp = 0;
        }
        coef *= sinal;
        mapa[exp] = (mapa[exp] || 0) + coef;
    });
    
    let grau = Math.max(...Object.keys(mapa).map(Number));

    let coefArray = [];

    for (let i = grau; i >= 0; i--) coefArray.push(mapa[i] || 0);

    return coefArray;
}

let fatorarPtrFunc;

window.Module = {
    onRuntimeInitialized: function() {
        fatorarPtrFunc = (ptr, len) => {
            return Module.ccall('fatorar_array', 'number', ['number', 'number'], [ptr, len]);
        };
        document.getElementById("btn").disabled = false;
        document.getElementById("saida").innerText = "[...]";
    }
};

function fatorar() {

    if (!fatorarPtrFunc) {
        alert("Waiting...");
        return;
    }
    
    let input = document.getElementById("input").value;
    if (!input.trim()) {
        alert("Type your polynomial");
        return;
    }
    
    let coef;
    try {
        coef = parsePolinomio(input);
    } catch (e) {
        document.getElementById("saida").innerText = "Erro: " + e.message;
        return;
    }
    
    let bytes = coef.length * 4;
    let ptr = Module._malloc(bytes);
    
    for (let i = 0; i < coef.length; i++) {
        Module.HEAP32[ptr / 4 + i] = coef[i];
    }
    
    let resultPtr = fatorarPtrFunc(ptr, coef.length);

    let bytesArray = [];
    for (let i = 0; i < 50000; i++) {
        let byte = Module.HEAPU8[resultPtr + i];
        if (byte === 0) break;
        bytesArray.push(byte);
    }
    
    let resultadoCompleto = new TextDecoder('utf-8').decode(new Uint8Array(bytesArray));
    
    let resultado = resultadoCompleto;
    let igualIndex = resultadoCompleto.indexOf('=');
    if (igualIndex !== -1 && igualIndex + 1 < resultadoCompleto.length) {
        resultado = resultadoCompleto.substring(igualIndex + 1).trim();
    }
    
    document.getElementById("saida").innerText = resultado;
    Module._free(ptr);
}
</script>

<script src="polynomialsz.js"></script>

</body>
</html>
